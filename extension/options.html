<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ferrico — Options</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 24px;
    }

    .container {
      width: 100%;
      max-width: 480px;
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .logo {
      width: 36px;
      height: 36px;
      background: #6366f1;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo svg { color: white; }

    .logo-row h1 {
      font-size: 20px;
      font-weight: 700;
      color: #f1f5f9;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 24px;
    }

    .card h2 {
      font-size: 15px;
      font-weight: 600;
      color: #f1f5f9;
      margin-bottom: 4px;
    }

    .card p {
      font-size: 13px;
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .card ol {
      font-size: 13px;
      color: #94a3b8;
      line-height: 1.6;
      padding-left: 20px;
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #64748b;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: #f1f5f9;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus { border-color: #6366f1; }
    ::placeholder { color: #334155; }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    button {
      padding: 9px 20px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      border: none;
      transition: background 0.15s;
    }

    .btn-save {
      background: #6366f1;
      color: white;
    }

    .btn-save:hover { background: #5254cc; }

    .btn-clear {
      background: transparent;
      border: 1px solid #334155;
      color: #94a3b8;
    }

    .btn-clear:hover { background: #1e293b; }

    .status {
      margin-top: 12px;
      font-size: 13px;
    }

    .status.success { color: #10b981; }
    .status.error { color: #ef4444; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-row">
      <div class="logo">
        <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M17.593 3.322c1.1.128 1.907 1.077 1.907 2.185V21L12 17.25 4.5 21V5.507c0-1.108.806-2.057 1.907-2.185a48.507 48.507 0 0111.186 0z" />
        </svg>
      </div>
      <h1>Ferrico</h1>
    </div>

    <div class="card">
      <h2>Connect to Ferrico Desktop</h2>
      <p>Paste the API token from the Ferrico desktop app to link this extension.</p>
      <ol>
        <li>Open the Ferrico desktop app</li>
        <li>Click <strong>Settings</strong> in the sidebar</li>
        <li>Copy the API token and paste it below</li>
      </ol>

      <label for="token">API Token</label>
      <input
        id="token"
        type="text"
        placeholder="Paste token here…"
        autocomplete="off"
        spellcheck="false"
      />

      <div class="btn-row">
        <button class="btn-save" id="save">Save Token</button>
        <button class="btn-clear" id="clear">Clear</button>
      </div>

      <div class="status" id="status"></div>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
