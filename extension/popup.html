<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ferrico</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
    }

    /* ── Header ───────────────────────────────────────────── */

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid #1e293b;
    }

    .logo {
      width: 28px;
      height: 28px;
      background: #6366f1;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo svg { color: white; }

    .header-title {
      font-size: 15px;
      font-weight: 600;
      color: #f1f5f9;
    }

    /* ── Form layout ──────────────────────────────────────── */

    .form {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #64748b;
    }

    input, textarea {
      width: 100%;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px;
      color: #f1f5f9;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus, textarea:focus { border-color: #6366f1; }

    textarea { resize: none; height: 56px; }

    ::placeholder { color: #475569; }

    /* ── Combobox shared ──────────────────────────────────── */

    .combobox-wrap {
      display: flex;
      flex-direction: column;
    }

    .ac-dropdown {
      display: none;
      margin-top: 4px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      max-height: 220px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #334155 transparent;
    }

    .ac-dropdown.open { display: block; }

    .ac-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      cursor: pointer;
      font-size: 13px;
      color: #94a3b8;
      transition: background 0.1s, color 0.1s;
      user-select: none;
    }

    .ac-item:hover,
    .ac-item.active {
      background: #293548;
      color: #f1f5f9;
    }

    .ac-item.is-selected { color: #cbd5e1; }

    .item-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .item-name {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .item-count {
      font-size: 11px;
      color: #475569;
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }

    .item-check {
      flex-shrink: 0;
      color: #6366f1;
      display: flex;
      align-items: center;
    }

    .ac-item.create-item { color: #818cf8; }
    .ac-item.create-item:hover,
    .ac-item.create-item.active {
      background: color-mix(in srgb, #6366f1 10%, #1e293b);
      color: #a5b4fc;
    }

    .ac-empty {
      color: #475569;
      font-style: italic;
      cursor: default;
    }
    .ac-empty:hover { background: transparent; color: #475569; }

    .ac-divider {
      height: 1px;
      background: #1e3a5f;
      margin: 3px 0;
    }

    /* ── Tag pill input ───────────────────────────────────── */

    .pill-input {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      align-items: center;
      min-height: 36px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 5px 8px;
      cursor: text;
      transition: border-color 0.15s;
    }

    .pill-input.focused { border-color: #6366f1; }

    .pill-input > input {
      flex: 1;
      min-width: 80px;
      width: auto;
      background: transparent;
      border: none;
      border-radius: 0;
      padding: 0;
      font-size: 13px;
      color: #f1f5f9;
      outline: none;
    }

    .pill-input > input:focus { border-color: transparent; }

    .tag-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 4px 2px 6px;
      border-radius: 20px;
      background: color-mix(in srgb, var(--tag-color) 14%, #1e293b);
      border: 1px solid var(--tag-color);
      color: #f1f5f9;
      font-size: 11px;
      font-weight: 500;
      flex-shrink: 0;
      max-width: 140px;
    }

    .tag-pill .tag-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--tag-color);
      flex-shrink: 0;
    }

    .tag-pill .pill-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tag-pill .pill-remove {
      cursor: pointer;
      opacity: 0.55;
      font-size: 14px;
      line-height: 1;
      padding: 0 2px;
      color: #f1f5f9;
      flex-shrink: 0;
    }

    .tag-pill .pill-remove:hover { opacity: 1; }

    /* ── Folder picker ────────────────────────────────────── */

    .folder-display {
      display: flex;
      align-items: center;
      gap: 6px;
      min-height: 36px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 6px 10px;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .folder-display.focused { border-color: #6366f1; }

    .folder-display .folder-icon { color: #475569; flex-shrink: 0; display: flex; align-items: center; }

    .folder-display > input {
      flex: 1;
      background: transparent;
      border: none;
      border-radius: 0;
      padding: 0;
      font-size: 13px;
      color: #f1f5f9;
      outline: none;
      cursor: pointer;
      min-width: 0;
    }

    .folder-display > input:focus { border-color: transparent; cursor: text; }

    .folder-caret {
      color: #475569;
      flex-shrink: 0;
      transition: transform 0.15s;
      display: flex;
      align-items: center;
    }

    .folder-display.focused .folder-caret { transform: rotate(180deg); }

    .folder-clear {
      cursor: pointer;
      color: #475569;
      font-size: 15px;
      line-height: 1;
      flex-shrink: 0;
      padding: 0 2px;
    }
    .folder-clear:hover { color: #94a3b8; }

    .folder-depth-arrow {
      color: #475569;
      font-size: 11px;
      flex-shrink: 0;
    }

    /* create-folder inline panel inside dropdown */
    .dropdown-create-row {
      padding: 8px 10px;
      display: flex;
      gap: 6px;
      align-items: center;
      border-top: 1px solid #1e3a5f;
    }

    .dropdown-create-row input {
      flex: 1;
      min-width: 0;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 5px 8px;
      font-size: 12px;
      color: #f1f5f9;
      font-family: inherit;
      outline: none;
    }

    .dropdown-create-row input:focus { border-color: #6366f1; }

    /* ── Creation panels ──────────────────────────────────── */

    .creation-panel {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 12px;
      background: #0a1628;
      border: 1px solid #1e3a5f;
      border-left: 2px solid #6366f1;
      border-radius: 8px;
      margin-top: 4px;
      animation: panel-in 0.14s ease;
    }

    @keyframes panel-in {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .creation-panel input {
      background: #1e293b;
      border-color: #334155;
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 13px;
    }

    .creation-panel input:focus { border-color: #6366f1; }

    .panel-actions {
      display: flex;
      gap: 6px;
      justify-content: flex-end;
    }

    .btn-ghost-sm {
      flex: none;
      padding: 5px 12px;
      border-radius: 6px;
      background: transparent;
      border: 1px solid #334155;
      color: #94a3b8;
      font-size: 12px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-ghost-sm:hover { background: #1e293b; }

    .btn-filled-sm {
      flex: none;
      padding: 5px 14px;
      border-radius: 6px;
      background: #6366f1;
      color: white;
      border: none;
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-filled-sm:hover { background: #5254cc; }

    .btn-create-sm {
      flex: none;
      padding: 0 10px;
      height: 28px;
      border: none;
      border-radius: 6px;
      background: #6366f1;
      color: white;
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }

    .btn-create-sm:hover { background: #5254cc; }

    .btn-cancel-sm {
      flex: none;
      padding: 0 8px;
      height: 28px;
      border: 1px solid #334155;
      border-radius: 6px;
      background: transparent;
      color: #94a3b8;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-cancel-sm:hover { background: #1e293b; }

    /* ── Color swatches ────────────────────────────────────── */

    .swatch-grid {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      align-items: center;
    }

    .swatch {
      width: 22px;
      height: 22px;
      min-width: 22px;
      border-radius: 50%;
      border: none;
      padding: 0;
      cursor: pointer;
      flex: none;
      position: relative;
      transition: transform 0.12s;
      outline: none;
    }

    .swatch::after {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      border: 2px solid transparent;
      transition: border-color 0.15s;
    }

    .swatch.selected::after { border-color: #f1f5f9; }
    .swatch:hover { transform: scale(1.18); }
    .swatch.selected { transform: scale(1.08); }

    /* ── Main footer buttons ───────────────────────────────── */

    .btn-row {
      display: flex;
      gap: 8px;
    }

    .btn-row button {
      flex: 1;
      padding: 9px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      border: none;
      transition: background 0.15s;
    }

    .btn-cancel {
      background: transparent;
      border: 1px solid #334155!important;
      color: #94a3b8;
    }

    .btn-cancel:hover { background: #1e293b; }

    .btn-save { background: #6366f1; color: white; }
    .btn-save:hover { background: #5254cc; }
    .btn-save:disabled { background: #3730a3; opacity: 0.6; cursor: not-allowed; }

    /* ── Status ────────────────────────────────────────────── */

    .status {
      padding: 6px 0;
      font-size: 13px;
      text-align: center;
      min-height: 22px;
    }

    .status.success { color: #10b981; }
    .status.error   { color: #ef4444; }

    /* ── No token ──────────────────────────────────────────── */

    .no-token { padding: 20px 16px; text-align: center; }
    .no-token p { color: #94a3b8; font-size: 13px; line-height: 1.5; margin-bottom: 12px; }
    .no-token a { color: #6366f1; text-decoration: none; font-size: 13px; font-weight: 500; }
    .no-token a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M17.593 3.322c1.1.128 1.907 1.077 1.907 2.185V21L12 17.25 4.5 21V5.507c0-1.108.806-2.057 1.907-2.185a48.507 48.507 0 0111.186 0z" />
      </svg>
    </div>
    <span class="header-title">Ferrico</span>
  </div>

  <div id="app"></div>

  <script src="popup.js"></script>
</body>
</html>
