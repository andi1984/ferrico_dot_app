<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ferrico</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #f1f5f9;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid #1e293b;
    }

    .logo {
      width: 28px;
      height: 28px;
      background: #6366f1;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo svg { color: white; }

    .header-title {
      font-size: 15px;
      font-weight: 600;
      color: #f1f5f9;
    }

    .form {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #64748b;
      margin-bottom: 5px;
    }

    input, textarea {
      width: 100%;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px;
      color: #f1f5f9;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus, textarea:focus {
      border-color: #6366f1;
    }

    textarea {
      resize: none;
      height: 56px;
    }

    ::placeholder { color: #475569; }

    .btn-row {
      display: flex;
      gap: 8px;
    }

    button {
      flex: 1;
      padding: 9px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      border: none;
      transition: background 0.15s;
    }

    .btn-cancel {
      background: transparent;
      border: 1px solid #334155;
      color: #94a3b8;
    }

    .btn-cancel:hover { background: #1e293b; }

    .btn-save {
      background: #6366f1;
      color: white;
    }

    .btn-save:hover { background: #5254cc; }
    .btn-save:disabled { background: #3730a3; opacity: 0.6; cursor: not-allowed; }

    .status {
      padding: 10px 16px;
      font-size: 13px;
      text-align: center;
    }

    .status.success { color: #10b981; }
    .status.error { color: #ef4444; }

    .no-token {
      padding: 20px 16px;
      text-align: center;
    }

    .no-token p {
      color: #94a3b8;
      font-size: 13px;
      line-height: 1.5;
      margin-bottom: 12px;
    }

    .no-token a {
      color: #6366f1;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
    }

    .no-token a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M17.593 3.322c1.1.128 1.907 1.077 1.907 2.185V21L12 17.25 4.5 21V5.507c0-1.108.806-2.057 1.907-2.185a48.507 48.507 0 0111.186 0z" />
      </svg>
    </div>
    <span class="header-title">Ferrico</span>
  </div>

  <div id="app"></div>

  <script src="popup.js"></script>
</body>
</html>
